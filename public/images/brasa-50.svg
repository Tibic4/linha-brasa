<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="body50" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#383838"/>
      <stop offset="100%" stop-color="#202020"/>
    </linearGradient>
    <radialGradient id="fire50" cx="0.5" cy="0.55" r="0.5">
      <stop offset="0%" stop-color="#FFECB3"/>
      <stop offset="25%" stop-color="#E65100"/>
      <stop offset="60%" stop-color="#BF360C"/>
      <stop offset="100%" stop-color="#4E1500" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow50" cx="0.5" cy="0.6" r="0.55">
      <stop offset="0%" stop-color="#BF360C" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#BF360C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="metalRim50" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="50%" stop-color="#555"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
    <filter id="fireGlow50">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="heavyGlow50">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>
  <rect width="400" height="500" fill="#111827"/>
  <!-- Large ambient glow -->
  <ellipse cx="200" cy="380" rx="180" ry="60" fill="#BF360C" opacity="0.05" filter="url(#heavyGlow50)"/>
  <!-- Double chimney for industrial feel -->
  <rect x="160" y="28" width="36" height="100" rx="5" fill="#303030" stroke="#4a4a4a" stroke-width="1.5"/>
  <rect x="204" y="28" width="36" height="100" rx="5" fill="#303030" stroke="#4a4a4a" stroke-width="1.5"/>
  <rect x="150" y="20" width="56" height="18" rx="5" fill="url(#metalRim50)"/>
  <rect x="194" y="20" width="56" height="18" rx="5" fill="url(#metalRim50)"/>
  <!-- Main body - wider and taller -->
  <rect x="85" y="126" width="230" height="280" rx="18" fill="url(#body50)" stroke="#4a4a4a" stroke-width="2"/>
  <!-- Top cap -->
  <ellipse cx="200" cy="126" rx="115" ry="25" fill="#3a3a3a" stroke="#5a5a5a" stroke-width="1.5"/>
  <!-- Bottom cap -->
  <ellipse cx="200" cy="406" rx="115" ry="25" fill="#202020" stroke="#3a3a3a" stroke-width="1"/>
  <!-- Industrial rivets along top band -->
  <rect x="83" y="158" width="234" height="10" rx="3" fill="url(#metalRim50)" opacity="0.8"/>
  <circle cx="105" cy="163" r="3" fill="#555" stroke="#666" stroke-width="0.5"/>
  <circle cx="135" cy="163" r="3" fill="#555" stroke="#666" stroke-width="0.5"/>
  <circle cx="165" cy="163" r="3" fill="#555" stroke="#666" stroke-width="0.5"/>
  <circle cx="235" cy="163" r="3" fill="#555" stroke="#666" stroke-width="0.5"/>
  <circle cx="265" cy="163" r="3" fill="#555" stroke="#666" stroke-width="0.5"/>
  <circle cx="295" cy="163" r="3" fill="#555" stroke="#666" stroke-width="0.5"/>
  <!-- Mid band -->
  <rect x="83" y="260" width="234" height="6" rx="2" fill="url(#metalRim50)" opacity="0.5"/>
  <!-- Bottom band with rivets -->
  <rect x="83" y="368" width="234" height="10" rx="3" fill="url(#metalRim50)" opacity="0.8"/>
  <circle cx="105" cy="373" r="3" fill="#555" stroke="#666" stroke-width="0.5"/>
  <circle cx="135" cy="373" r="3" fill="#555" stroke="#666" stroke-width="0.5"/>
  <circle cx="165" cy="373" r="3" fill="#555" stroke="#666" stroke-width="0.5"/>
  <circle cx="235" cy="373" r="3" fill="#555" stroke="#666" stroke-width="0.5"/>
  <circle cx="265" cy="373" r="3" fill="#555" stroke="#666" stroke-width="0.5"/>
  <circle cx="295" cy="373" r="3" fill="#555" stroke="#666" stroke-width="0.5"/>
  <!-- Large door frame -->
  <rect x="130" y="195" width="140" height="145" rx="14" fill="#080808" stroke="#5a5a5a" stroke-width="3"/>
  <rect x="133" y="198" width="134" height="139" rx="12" fill="none" stroke="#3a3a3a" stroke-width="0.8"/>
  <!-- Inner fire area -->
  <rect x="140" y="204" width="120" height="127" rx="9" fill="#1a0600"/>
  <!-- Deep intense fire -->
  <ellipse cx="200" cy="298" rx="52" ry="40" fill="url(#fire50)" filter="url(#fireGlow50)"/>
  <path d="M164 292 Q170 255 180 272 Q185 238 196 265 Q200 232 210 262 Q216 240 224 270 Q230 252 236 290" fill="#BF360C" opacity="0.95"/>
  <path d="M174 296 Q180 265 190 280 Q196 255 204 276 Q210 258 218 278 Q224 266 228 294" fill="#E65100" opacity="0.8"/>
  <path d="M184 300 Q190 275 198 286 Q204 270 210 284 Q216 274 220 298" fill="#FF8F00" opacity="0.6"/>
  <path d="M192 304 Q196 286 200 294 Q204 284 208 302" fill="#FFECB3" opacity="0.45"/>
  <!-- Sparks -->
  <circle cx="178" cy="242" r="1.2" fill="#E65100" opacity="0.7"/>
  <circle cx="222" cy="238" r="1" fill="#BF360C" opacity="0.6"/>
  <circle cx="195" cy="235" r="0.8" fill="#FF8F00" opacity="0.5"/>
  <circle cx="210" cy="230" r="1" fill="#E65100" opacity="0.4"/>
  <!-- Embers bed -->
  <ellipse cx="200" cy="322" rx="40" ry="8" fill="#BF360C" opacity="0.5"/>
  <circle cx="175" cy="322" r="3" fill="#BF360C" opacity="0.8"/>
  <circle cx="190" cy="324" r="2.5" fill="#E65100" opacity="0.7"/>
  <circle cx="210" cy="323" r="3" fill="#BF360C" opacity="0.75"/>
  <circle cx="225" cy="322" r="2" fill="#E65100" opacity="0.6"/>
  <!-- Door handle - industrial -->
  <rect x="260" y="258" width="6" height="28" rx="3" fill="#777"/>
  <circle cx="263" cy="256" r="5" fill="none" stroke="#888" stroke-width="2"/>
  <!-- Glow overlay -->
  <rect x="130" y="195" width="140" height="145" rx="14" fill="url(#glow50)" opacity="0.4"/>
  <!-- Heavy duty legs -->
  <rect x="110" y="422" width="22" height="46" rx="5" fill="#303030" stroke="#4a4a4a" stroke-width="1.5"/>
  <rect x="268" y="422" width="22" height="46" rx="5" fill="#303030" stroke="#4a4a4a" stroke-width="1.5"/>
  <!-- Cross braces -->
  <rect x="130" y="435" width="140" height="6" rx="2" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="0.5"/>
  <rect x="130" y="452" width="140" height="6" rx="2" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="0.5"/>
  <!-- Floor shadow -->
  <ellipse cx="200" cy="472" rx="110" ry="12" fill="#000" opacity="0.35"/>
  <!-- Label -->
  <text x="200" y="494" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#BF360C" letter-spacing="3">BRASA 50</text>
</svg>