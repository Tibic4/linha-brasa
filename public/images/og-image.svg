<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="ogGlow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#111827" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ogBg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0f1520"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="ogAccentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0"/>
      <stop offset="30%" stop-color="#FF6B00"/>
      <stop offset="70%" stop-color="#FF4F00"/>
      <stop offset="100%" stop-color="#FF4F00" stop-opacity="0"/>
    </linearGradient>
    <filter id="ogTextGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="ogSoftGlow">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#ogBg)"/>
  <!-- Subtle grid pattern -->
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#1a2235" stroke-width="0.5"/>
  <line x1="0" y1="400" x2="1200" y2="400" stroke="#1a2235" stroke-width="0.5"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#1a2235" stroke-width="0.5"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#1a2235" stroke-width="0.5"/>
  <!-- Central glow -->
  <ellipse cx="600" cy="315" rx="400" ry="250" fill="#FF6B00" opacity="0.04" filter="url(#ogSoftGlow)"/>
  <!-- Decorative fire element (abstract) -->
  <ellipse cx="600" cy="280" rx="60" ry="80" fill="#FF6B00" opacity="0.06" filter="url(#ogSoftGlow)"/>
  <!-- Small boiler icon -->
  <g transform="translate(600, 180)" opacity="0.15">
    <rect x="-25" y="-60" width="50" height="80" rx="6" fill="#FF6B00"/>
    <ellipse cx="0" cy="-60" rx="25" ry="6" fill="#FF8F00"/>
    <rect x="-8" y="-90" width="16" height="32" rx="2" fill="#FF6B00"/>
  </g>
  <!-- Accent line -->
  <rect x="200" y="310" width="800" height="2" fill="url(#ogAccentLine)" rx="1"/>
  <!-- LINHA text -->
  <text x="600" y="270" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="300" fill="#888" letter-spacing="16">LINHA</text>
  <!-- BRASA text -->
  <text x="600" y="370" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="96" font-weight="900" fill="#FF6B00" letter-spacing="12" filter="url(#ogTextGlow)">BRASA</text>
  <!-- Tagline -->
  <text x="600" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="300" fill="#9CA3AF" letter-spacing="6">CALDEIRAS A LENHA PARA PISCINAS</text>
  <!-- Bottom accent -->
  <rect x="540" y="470" width="120" height="2" fill="#FF6B00" opacity="0.4" rx="1"/>
  <!-- Corner accents -->
  <path d="M30 30 L80 30 L80 34 L34 34 L34 80 L30 80 Z" fill="#FF6B00" opacity="0.2"/>
  <path d="M1170 30 L1120 30 L1120 34 L1166 34 L1166 80 L1170 80 Z" fill="#FF6B00" opacity="0.2"/>
  <path d="M30 600 L80 600 L80 596 L34 596 L34 550 L30 550 Z" fill="#FF6B00" opacity="0.2"/>
  <path d="M1170 600 L1120 600 L1120 596 L1166 596 L1166 550 L1170 550 Z" fill="#FF6B00" opacity="0.2"/>
  <!-- Website URL -->
  <text x="600" y="570" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#555" letter-spacing="4">LINHABRASA.COM.BR</text>
</svg>