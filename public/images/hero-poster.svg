<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <radialGradient id="heroGlow" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#FF3D00" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#111827" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="poolWater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#1B2838"/>
    </linearGradient>
    <radialGradient id="fireReflection" cx="0.5" cy="0" r="0.8">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </radialGradient>
    <filter id="heroBlur">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="waterRipple">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="60%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#141c2e"/>
    </linearGradient>
  </defs>
  <!-- Sky / background -->
  <rect width="1200" height="800" fill="url(#skyGrad)"/>
  <!-- Stars -->
  <circle cx="150" cy="80" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="340" cy="45" r="0.8" fill="#fff" opacity="0.25"/>
  <circle cx="580" cy="90" r="1.2" fill="#fff" opacity="0.2"/>
  <circle cx="800" cy="60" r="0.8" fill="#fff" opacity="0.3"/>
  <circle cx="950" cy="100" r="1" fill="#fff" opacity="0.2"/>
  <circle cx="1050" cy="55" r="0.7" fill="#fff" opacity="0.25"/>
  <circle cx="250" cy="130" r="0.6" fill="#fff" opacity="0.15"/>
  <circle cx="700" cy="120" r="0.9" fill="#fff" opacity="0.2"/>
  <!-- Central fire glow in atmosphere -->
  <ellipse cx="600" cy="320" rx="300" ry="200" fill="#FF6B00" opacity="0.06" filter="url(#heroBlur)"/>
  <ellipse cx="600" cy="350" rx="150" ry="100" fill="#FF4F00" opacity="0.1" filter="url(#heroBlur)"/>
  <!-- Boiler silhouette (centered, dark) -->
  <rect x="540" y="180" width="120" height="200" rx="10" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <ellipse cx="600" cy="180" rx="60" ry="14" fill="#222" stroke="#333" stroke-width="0.5"/>
  <ellipse cx="600" cy="380" rx="60" ry="14" fill="#151515"/>
  <!-- Chimney -->
  <rect x="585" y="120" width="30" height="65" rx="3" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="0.5"/>
  <rect x="579" y="115" width="42" height="12" rx="3" fill="#252525"/>
  <!-- Fire in door -->
  <rect x="565" y="260" width="70" height="80" rx="7" fill="#0d0600"/>
  <ellipse cx="600" cy="310" rx="28" ry="22" fill="#FF6B00" opacity="0.8"/>
  <path d="M582 305 Q586 285 594 294 Q598 278 604 292 Q610 280 618 302" fill="#FF8F00" opacity="0.7"/>
  <path d="M588 308 Q594 294 600 302 Q606 292 612 306" fill="#FFE0B2" opacity="0.5"/>
  <!-- Fire light cast on ground -->
  <ellipse cx="600" cy="400" rx="100" ry="20" fill="#FF6B00" opacity="0.08"/>
  <!-- Legs -->
  <rect x="555" y="390" width="10" height="28" rx="3" fill="#1a1a1a"/>
  <rect x="635" y="390" width="10" height="28" rx="3" fill="#1a1a1a"/>
  <!-- Pool area (lower third) -->
  <rect x="0" y="500" width="1200" height="300" fill="url(#poolWater)"/>
  <!-- Pool edge -->
  <rect x="0" y="495" width="1200" height="12" fill="#1a2030" rx="2"/>
  <line x1="0" y1="494" x2="1200" y2="494" stroke="#2a3548" stroke-width="1"/>
  <!-- Fire reflection on water -->
  <ellipse cx="600" cy="580" rx="120" ry="60" fill="url(#fireReflection)" filter="url(#waterRipple)"/>
  <!-- Water ripple lines -->
  <path d="M350 540 Q450 535 550 540 Q650 545 750 540 Q850 535 950 540" fill="none" stroke="#1e3045" stroke-width="0.8" opacity="0.5"/>
  <path d="M300 580 Q420 575 540 580 Q660 585 780 580 Q900 575 1000 580" fill="none" stroke="#1e3045" stroke-width="0.8" opacity="0.4"/>
  <path d="M380 620 Q480 616 580 620 Q680 624 780 620 Q880 616 940 620" fill="none" stroke="#1e3045" stroke-width="0.6" opacity="0.3"/>
  <path d="M400 660 Q500 657 600 660 Q700 663 800 660" fill="none" stroke="#1e3045" stroke-width="0.5" opacity="0.2"/>
  <!-- Orange reflection streaks on water -->
  <line x1="580" y1="510" x2="570" y2="600" stroke="#FF6B00" stroke-width="2" opacity="0.06"/>
  <line x1="600" y1="510" x2="600" y2="620" stroke="#FF6B00" stroke-width="3" opacity="0.08"/>
  <line x1="620" y1="510" x2="630" y2="600" stroke="#FF6B00" stroke-width="2" opacity="0.06"/>
  <!-- Distant tree silhouettes -->
  <path d="M0 460 Q50 430 80 460 Q110 420 150 455 Q180 435 220 460 Q250 440 280 460 L280 500 L0 500 Z" fill="#0d1420" opacity="0.6"/>
  <path d="M900 450 Q940 415 970 450 Q1000 425 1040 445 Q1070 420 1100 450 Q1130 430 1200 455 L1200 500 L900 500 Z" fill="#0d1420" opacity="0.6"/>
</svg>