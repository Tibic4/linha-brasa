<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="body25" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2e2e2e"/>
      <stop offset="100%" stop-color="#1c1c1c"/>
    </linearGradient>
    <radialGradient id="fire25" cx="0.5" cy="0.6" r="0.5">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="35%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#BF360C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow25" cx="0.5" cy="0.65" r="0.6">
      <stop offset="0%" stop-color="#FF6B00" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="metalRim25" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#666"/>
      <stop offset="50%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#252525"/>
    </linearGradient>
    <filter id="fireGlow25">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="outerGlow25">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
  </defs>
  <rect width="400" height="500" fill="#111827"/>
  <!-- Ambient glow -->
  <ellipse cx="200" cy="420" rx="140" ry="30" fill="#FF6B00" opacity="0.06"/>
  <ellipse cx="200" cy="300" rx="80" ry="80" fill="#FF6B00" opacity="0.04" filter="url(#outerGlow25)"/>
  <!-- Chimney -->
  <rect x="178" y="48" width="44" height="90" rx="4" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1.5"/>
  <rect x="168" y="42" width="64" height="16" rx="4" fill="url(#metalRim25)"/>
  <!-- Smoke -->
  <circle cx="200" cy="28" r="10" fill="#666" opacity="0.1"/>
  <circle cx="210" cy="14" r="7" fill="#666" opacity="0.07"/>
  <!-- Main body -->
  <rect x="110" y="138" width="180" height="260" rx="14" fill="url(#body25)" stroke="#3a3a3a" stroke-width="1.5"/>
  <!-- Top cap -->
  <ellipse cx="200" cy="138" rx="90" ry="20" fill="#323232" stroke="#4a4a4a" stroke-width="1"/>
  <!-- Bottom cap -->
  <ellipse cx="200" cy="398" rx="90" ry="20" fill="#1c1c1c" stroke="#333" stroke-width="1"/>
  <!-- Bands -->
  <rect x="108" y="170" width="184" height="7" rx="2" fill="url(#metalRim25)" opacity="0.7"/>
  <rect x="108" y="260" width="184" height="4" rx="1" fill="url(#metalRim25)" opacity="0.4"/>
  <rect x="108" y="355" width="184" height="7" rx="2" fill="url(#metalRim25)" opacity="0.7"/>
  <!-- Door frame -->
  <rect x="148" y="210" width="104" height="115" rx="10" fill="#0d0d0d" stroke="#4a4a4a" stroke-width="2"/>
  <!-- Inner fire area -->
  <rect x="154" y="216" width="92" height="103" rx="7" fill="#1a0800"/>
  <!-- Fire glow base -->
  <ellipse cx="200" cy="295" rx="40" ry="30" fill="url(#fire25)" filter="url(#fireGlow25)"/>
  <!-- Fire tongues -->
  <path d="M178 288 Q182 262 190 275 Q194 252 202 270 Q208 250 214 272 Q220 258 224 285" fill="#FF6B00" opacity="0.9"/>
  <path d="M185 292 Q190 272 198 282 Q204 265 210 280 Q215 270 218 290" fill="#FFCC80" opacity="0.7"/>
  <path d="M192 296 Q196 280 200 288 Q204 278 208 294" fill="#FFF3E0" opacity="0.5"/>
  <!-- Embers -->
  <circle cx="185" cy="310" r="2" fill="#FF6B00" opacity="0.8"/>
  <circle cx="210" cy="312" r="1.5" fill="#FF6B00" opacity="0.6"/>
  <circle cx="198" cy="314" r="2.5" fill="#BF360C" opacity="0.7"/>
  <!-- Door handle -->
  <circle cx="243" cy="267" r="6" fill="none" stroke="#666" stroke-width="2"/>
  <circle cx="243" cy="267" r="2" fill="#555"/>
  <!-- Glow overlay on door -->
  <rect x="148" y="210" width="104" height="115" rx="10" fill="url(#glow25)" opacity="0.4"/>
  <!-- Legs -->
  <rect x="132" y="410" width="16" height="42" rx="4" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1"/>
  <rect x="252" y="410" width="16" height="42" rx="4" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1"/>
  <!-- Floor shadow -->
  <ellipse cx="200" cy="455" rx="90" ry="10" fill="#000" opacity="0.3"/>
  <!-- Bestseller badge -->
  <rect x="280" y="130" width="90" height="24" rx="12" fill="#FF6B00"/>
  <text x="325" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff" letter-spacing="1">MAIS VENDIDA</text>
  <!-- Label -->
  <text x="200" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FF6B00" letter-spacing="3">BRASA 25</text>
</svg>